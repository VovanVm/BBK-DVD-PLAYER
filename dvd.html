<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BBK DVD UI Retro</title>
  <style>
    
	/* ПОДКЛЮЧЕНИЕ ЛОКАЛЬНОГО ШРИФТА */
    @font-face {
      font-family: 'HVR';
      src: url('hvr.otf') format('opentype');
	  font-smooth: never;
	  -webkit-font-smoothing: none;
      font-weight: normal;
      font-style: normal;
    }

    /* ПРИМЕНЕНИЕ ШРИФТА КО ВСЕМ ЭЛЕМЕНТАМ */
    body, .topbar, .musicbar, .song, .bottom, .time-display, .track-counter, .play-square, .bottom div {
      font-family: 'HVR', Tahoma, 'Courier New', monospace;
    }
	
	* {
      box-sizing: border-box;
      user-select: none;
    }
	

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Tahoma, sans-serif;
      background: #000;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('https://f2.toyhou.se/file/f2-toyhou-se/images/116015682_xBuqLuY2iU11mig.png');
      background-size: cover;
      background-position: center;
      filter: blur(2px) brightness(0.7);
      transform: scale(1.05);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0px,
        rgba(255,255,255,0) 1px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      mix-blend-mode: soft-light;
    }

    .player {
      position: relative;
      width: 760px;
      height: 500px;
      border-radius: 18px;
      background: transparent;
      overflow: hidden;
    }

    .topbar {
      position: absolute;
      left: 40px;
      top: 35px;
      width: 680px;
      height: 80px;
      border-radius: 10px;
      background-image: url('https://www.transparenttextures.com/patterns/carbon-fiber.png');
      background-color: #1b1e22f0;
      background-blend-mode: overlay;
      border: 2px solid rgba(255,255,255,0);
      box-shadow: inset 0 0 12px rgba(0,0,0,0), 0 4px 8px rgba(0,0,0,0);
      display: flex;
      flex-direction: column;
      padding: 6px 12px;
      z-index: 10;
    }
	
    .art-link {
      position: absolute;
      bottom: 15px;
      right: 615px;
      z-index: 20;
      font-family: 'HVR', Tahoma, monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      cursor: pointer;
    }

    .art-link:hover {
      color: rgba(255,255,255,1);
      background: rgba(0,0,0,0.6);
    }
	
    .topbar-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
    }

    .time-display {
      display: flex;
      gap: 15px;
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #ffffff;
      text-shadow: 0 0 3px #00000000;
    }

    .play-square {
      width: 32px;
      height: 24px;
      border-radius: 5px;
      border: 2px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background-image: url('https://www.transparenttextures.com/patterns/diagmonds.png');
      background-color: rgba(0,0,0,0.5);
      background-blend-mode: overlay;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.1), 0 1px 2px rgba(0,0,0,0.3);
    }

    .play-square:hover {
      background: rgba(255,255,255,0.2);
    }

    .play-icon {
      font-size: 14px;
      color: white;
    }

    .topbar-row2 {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 4px;
    }

    .track-counter {
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      color: #ffffff;
      background: rgba(0,0,0,0);
      padding: 2px 8px;
      border-radius: 12px;
      letter-spacing: 1px;
    }

    .volume-bars-container {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .volume-bars {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 14px;
    }

    .vbar {
      width: 2px;
      background: #00cc66;
      border-radius: 0px;
    }

    .vbar.empty {
      background: #555;
    }

    /* МАЛЕНЬКИЙ СПЕКТР (уменьшенная копия большого) */
    .mini-spectrum {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 16px;
      margin-left: 5px;
    }

    .mini-bar {
      width: 8px;
      background: linear-gradient(to top, #007d02, #b9a700, #ff3939);
      border-radius: 0px;
    }

    /* БОЛЬШОЙ СПЕКТР — СКРЫТ */
    .big-spectrum {
      display: none;
    }

    .musicbar {
      position: absolute;
      left: 38px;
      top: 130px;
      width: 685px;
      height: 45px;
      border-radius: 8px;
      background-image: url('folder.png');
      background-color: #00000000;
      background-blend-mode: overlay;
      border: 2px solid rgba(255,255,255,0);
      display: flex;
      align-items: center;
      padding: 0 14px;
      color: white;
      font-size: 28px;
      text-shadow: 2px 2px black;
      font-weight: bold;
      z-index: 5;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0), 0 2px 4px rgba(0,0,0,0);
    }

    .folder {
      margin-right: 10px;
    }
	
	.list {
	  position: absolute;
	  left: 40px;
	  top: 190px;
	  width: 680px;
	  height: 230px;
	  border-radius: 8px;
	  border: 2px solid rgba(255,255,255,0);
	  overflow: hidden;
	  display: flex;
	  z-index: 5;
	  box-shadow: inset 0 0 20px rgba(0,0,0,0);
	}

    .songs {
      width: 58%;
	  background-image: url('song.png');
	  background-color: rgba(0,0,0,0);
	  background-size: 100% 100%;  /* РАСТЯГИВАЕТ ПОЛНОСТЬЮ ДО КРАЁВ */
	  background-repeat: no-repeat; /* НЕ ПОВТОРЯТЬ */
	  background-position: center;  /* ЦЕНТРИРОВАНИЕ */
      padding: 10px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .songs::-webkit-scrollbar {
      width: 6px;
    }

    .songs::-webkit-scrollbar-track {
      background-image: url('https://www.transparenttextures.com/patterns/carbon-fiber.png');
      background-color: #2a2e35;
      background-blend-mode: overlay;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .songs::-webkit-scrollbar-thumb {
      background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
      background-color: #ffcb2f;
      background-blend-mode: overlay;
      border-radius: 4px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.5);
    }

    .song {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      font-size: 22px;
      margin: 5px 0;
      padding: 4px 8px;
      text-shadow: 2px 2px black;
      cursor: pointer;
      border-radius: 8px;
      //background-image: url('https://www.transparenttextures.com/patterns/black-scales.png');
      background-color: rgba(0,0,0,0);
      background-blend-mode: overlay;
      backdrop-filter: blur(2px);
    }

    .song:hover {
      background: rgba(255,255,255,0.2);
    }

    .song.active {
      background: #ffcb2f;
      color: black;
      text-shadow: none;
    }

    .mp3 {
      color: #ff4747;
      font-size: 12px;
      background: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
    }

    .preview {
      flex: 1;
      position: relative;
      border-left: 2px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.9;
    }

    .bottom {
      position: absolute;
      left: 45px;
      bottom: 10px;
      width: 670px;
      height: 52px;
      border-radius: 10px;
      background-image: url('https://www.transparenttextures.com/patterns/carbon-fiber.png');
      background-color: #1b1e22f0;
      background-blend-mode: overlay;
      border: 2px solid rgba(255,255,255,0);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      font-weight: bold;
      letter-spacing: 3px;
      box-shadow: inset 0 1px 3px rgba(255,255,255,0), 0 4px 8px rgba(0,0,0,0);
      z-index: 10;
    }
	
    .bottom div {
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 8px;
      transition: background 0.2s;
      background-image: url('https://www.transparenttextures.com/patterns/diagmonds.png');
      background-color: rgba(0,0,0,0.6);
      background-blend-mode: overlay;
      border: 1px solid rgba(255,255,255,0.2);
      text-shadow: 1px 1px 0 black;
    }

    .bottom div:hover {
      background: rgba(255,255,255,0.2);
    }

    .crt {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0));
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="player">
    <div class="topbar">
      <div class="topbar-row1">
        <div class="time-display">
          <span id="currentTime">--:--</span>
          <span id="totalTime">--:--</span>
        </div>
        <div class="play-square" id="topPlayBtn">
          <div class="play-icon" id="topPlayIcon">▶</div>
        </div>
      </div>

      <div class="topbar-row2">
        <div class="track-counter" id="trackCounter">0/0</div>
        <div class="volume-bars-container" id="volumeContainer">
          <div class="volume-bars" id="volumeBars"></div>
        </div>
        <div class="mini-spectrum" id="miniSpectrum"></div>
      </div>
    </div>

    <!-- Большой спектр скрыт -->
    <div class="big-spectrum" id="bigSpectrum"></div>

    <div class="musicbar">
      <span class="folder"></span>
      
    </div>

    <div class="list">
      <div class="songs" id="songsList"></div>

      <div class="preview">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:white;text-align:center;padding:20px;text-shadow:2px 2px black;font-size:28px;backdrop-filter:blur(2px);z-index:2;">
          <div style="font-size:70px;margin-bottom:10px;">⬇</div>
          <div>Перетащите MP3 сюда</div>
          <div style="font-size:18px;opacity:0.8;margin-top:14px;line-height:1.5;">
            файлы автоматически появятся<br>
            в списке как на DVD-плеере
          </div>
        </div>
        <img src="upload.png" alt="furry background">
      </div>
    </div>

    <div class="bottom">
      <div id="prevBtn">◀</div>
      <div id="playPauseBtn">▶ PLAY</div>
      <div id="nextBtn">▶</div>
    </div>
    <div class="crt"></div>
  </div>

  <script>
    // Генерация МАЛЕНЬКОГО спектра (8 полосок, как большой но уменьшенный)
    const miniSpectrum = document.getElementById('miniSpectrum');
    for (let i = 0; i < 12; i++) {
      const bar = document.createElement('div');
      bar.className = 'mini-bar';
      bar.style.height = '0px';
      miniSpectrum.appendChild(bar);
    }

    // Полоски громкости (12 шт)
    const volumeBarsContainer = document.getElementById('volumeBars');
    for (let i = 0; i < 20; i++) {
      const bar = document.createElement('div');
      bar.className = 'vbar empty';
      volumeBarsContainer.appendChild(bar);
    }

    // === ПЕРЕМЕННЫЕ ===
    const songsContainer = document.getElementById('songsList');
    let trackList = [];
    let currentTrackIndex = 0;

    const audio = new Audio();
    audio.volume = 0.7;

    let ctx = null;
    let analyser = null;
    let source = null;

    // Элементы UI
    const currentTimeSpan = document.getElementById('currentTime');
    const totalTimeSpan = document.getElementById('totalTime');
    const topPlayBtn = document.getElementById('topPlayBtn');
    const topPlayIcon = document.getElementById('topPlayIcon');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const trackCounterSpan = document.getElementById('trackCounter');
    const volumeContainer = document.getElementById('volumeContainer');

    // === ФУНКЦИИ ===
    function updateTrackCounter() {
      if (trackList.length === 0) {
        trackCounterSpan.innerText = '0/0';
      } else {
        trackCounterSpan.innerText = `${currentTrackIndex + 1}/${trackList.length}`;
      }
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimeDisplay() {
      if (audio.duration && !isNaN(audio.duration)) {
        currentTimeSpan.innerText = formatTime(audio.currentTime);
        totalTimeSpan.innerText = formatTime(audio.duration);
      } else {
        currentTimeSpan.innerText = '00:00';
        totalTimeSpan.innerText = '00:00';
      }
    }

    function updatePlayIcon() {
      if (!audio.paused) {
        topPlayIcon.innerText = '⏸';
        if (playPauseBtn) playPauseBtn.innerHTML = '⏸ PAUSE';
      } else {
        topPlayIcon.innerText = '▶';
        if (playPauseBtn) playPauseBtn.innerHTML = '▶ PLAY';
      }
    }

    function updateVolumeBars() {
      const volume = audio.volume;
      const bars = document.querySelectorAll('.vbar');
      const activeCount = Math.floor(volume * 20);
      bars.forEach((bar, index) => {
        if (index < activeCount) {
          bar.classList.remove('empty');
          const height = 4 + (index / 20) * 20;
          bar.style.height = `${height}px`;
          bar.style.background = '#ff3939';
        } else {
          bar.classList.add('empty');
          bar.style.height = '3px';
          bar.style.background = '#555';
        }
      });
    }

    // Анимация маленького спектра (плавный рост 0-14px)
    function animateMiniSpectrum(data) {
      const bars = document.querySelectorAll('.mini-bar');
      bars.forEach((bar, i) => {
        const val = data[i * 2] || 0;
        // val от 0 до 255 -> height от 0 до 16
        const h = (val / 255) * 25;
        bar.style.height = Math.max(1, h) + 'px';
      });
    }

    function renderSongList() {
      songsContainer.innerHTML = '';
      trackList.forEach((file, idx) => {
        const row = document.createElement('div');
        row.className = 'song';
        if (idx === currentTrackIndex) row.classList.add('active');

        const cleanName = file.name
          .replace(/\.mp3$/i, '')
          .replace(/_/g, ' ')
          .substring(0, 35);

		row.innerHTML = `
		  <img src="mp3.png" class="mp3-icon" style="width: 40px; height: 40px; vertical-align: middle;">
		  ${cleanName}
		`;

        row.onclick = (function(index) {
          return function() { playFileByIndex(index); };
        })(idx);

        songsContainer.appendChild(row);
      });

      if (trackList.length === 0) {
        songsContainer.innerHTML = '<div style="color:white; text-align:center; padding:20px;">⬇ Перетащите MP3</div>';
      }
    }

    function playFileByIndex(index) {
      if (index < 0 || index >= trackList.length) return;
      currentTrackIndex = index;
      const file = trackList[currentTrackIndex];

      const url = URL.createObjectURL(file);
      audio.src = url;
      audio.play();

      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ctx.createAnalyser();
        source = ctx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(ctx.destination);
        analyser.fftSize = 256;
        animateSpectrums();
      }

      renderSongList();
      updateTrackCounter();
      updateTimeDisplay();
      updatePlayIcon();
      updateVolumeBars();
    }

    function animateSpectrums() {
      const data = new Uint8Array(analyser.frequencyBinCount);

      function frame() {
        requestAnimationFrame(frame);
        if (!analyser) return;
        analyser.getByteFrequencyData(data);
        
        // Маленький спектр
        animateMiniSpectrum(data);
      }
      frame();
    }

    function togglePlayPause() {
      if (trackList.length === 0) return;
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
      updatePlayIcon();
    }

    function nextTrack() {
      if (trackList.length === 0) return;
      const nextIndex = (currentTrackIndex + 1) % trackList.length;
      playFileByIndex(nextIndex);
    }

    function prevTrack() {
      if (trackList.length === 0) return;
      const prevIndex = (currentTrackIndex - 1 + trackList.length) % trackList.length;
      playFileByIndex(prevIndex);
    }

    // === ОБРАБОТЧИКИ ===
    topPlayBtn.addEventListener('click', togglePlayPause);
    playPauseBtn.addEventListener('click', togglePlayPause);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    audio.addEventListener('play', updatePlayIcon);
    audio.addEventListener('pause', updatePlayIcon);
    audio.addEventListener('timeupdate', updateTimeDisplay);
    audio.addEventListener('ended', nextTrack);
    audio.addEventListener('volumechange', updateVolumeBars);

    // Громкость колёсиком только при наведении на контейнер громкости
    volumeContainer.addEventListener('wheel', (e) => {
      e.preventDefault();
      e.stopPropagation();
      let newVolume = audio.volume;
      if (e.deltaY < 0) {
        newVolume = Math.min(1, newVolume + 0.05);
      } else {
        newVolume = Math.max(0, newVolume - 0.05);
      }
      audio.volume = newVolume;
      updateVolumeBars();
    });

    // DRAG & DROP MP3
    document.body.addEventListener('dragover', (e) => e.preventDefault());
    document.body.addEventListener('drop', async (e) => {
      e.preventDefault();

      const files = [...e.dataTransfer.files].filter(f =>
        f.type.includes('audio') || f.name.endsWith('.mp3')
      );

      if (files.length === 0) return;

      for (const file of files) {
        trackList.push(file);
      }

      if (trackList.length === files.length && currentTrackIndex === 0 && !audio.src) {
        playFileByIndex(0);
      } else {
        renderSongList();
        updateTrackCounter();
      }
    });

	    // === ССЫЛКА НА АВТОРА ОБОЕВ ===
    const artLink = document.createElement('a');
    artLink.className = 'art-link';
    artLink.id = 'artLink';
    artLink.innerText = 'By Art Poiuu';
    artLink.href = 'https://toyhou.se/Poiuu'; // <--- СЮДА ВСТАВЬ СВОЮ ССЫЛКУ
    artLink.target = '_blank';
    document.querySelector('.player').appendChild(artLink);

    // Инициализация
    renderSongList();
    updateVolumeBars();
    updateTimeDisplay();
    updateTrackCounter();
  </script>
</body>
</html>
